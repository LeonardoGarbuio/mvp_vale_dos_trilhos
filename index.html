<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Greentech | Firewall Ambiental</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          colors: {
            black: '#000000',
            zinc: {
              850: '#1f1f22',
              900: '#18181b',
              950: '#09090b',
            }
          }
        }
      }
    }
  </script>

  <!-- Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  
  <!-- Babel Standalone para transpilar JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Three.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  
  <style>
    body {
      background-color: #000000;
      color: #ffffff;
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }
    
    .grid-data {
      background-size: 50px 50px;
      background-image: linear-gradient(to right, rgba(255, 255, 255, 0.04) 1px, transparent 1px),
                        linear-gradient(to bottom, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
      mask-image: radial-gradient(ellipse at top, black 20%, transparent 80%);
      -webkit-mask-image: radial-gradient(ellipse at top, black 20%, transparent 80%);
    }
    
    .blinking::after {
      content: '▋';
      animation: cursor-blink 1s step-start infinite;
      color: #ffffff;
    }
    
    @keyframes cursor-blink { 50% { opacity: 0; } }
    
    /* Subtle hover effect for cards */
    .glow-card {
      transition: all 0.3s ease;
    }
    .glow-card:hover {
      border-color: #3f3f46;
      background-color: #18181b;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #3f3f46; }
    ::-webkit-scrollbar-thumb:hover { background: #52525b; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function App() {
      const [spinStep, setSpinStep] = useState(1);
      const [activeBenefit, setActiveBenefit] = useState(0);
      const [formData, setFormData] = useState({
        segmento: '',
        volume: '',
        material: '',
        nome: '',
        empresa: '',
        email: '',
        telefone: ''
      });

      const canvasRef = useRef(null);

      const prevFormStep = () => {
        setSpinStep(prev => Math.max(1, prev - 1));
      };

      const handleInputChange = (e) => {
        const { name, value } = e.target;
        setFormData(prev => ({ ...prev, [name]: value }));
      };

      const selectValueAndAdvance = (field, value) => {
        setFormData(prev => ({ ...prev, [field]: value }));
        setTimeout(() => {
          setSpinStep(prev => prev + 1);
        }, 200);
      };

      useEffect(() => {
        const interval = setInterval(() => {
          setActiveBenefit(prev => (prev + 1) % 3);
        }, 6000);
        return () => clearInterval(interval);
      }, []);

      useEffect(() => {
        if (!window.THREE || !canvasRef.current) return;

        const THREE = window.THREE;
        const container = canvasRef.current;
        container.innerHTML = '';

        let width = container.clientWidth || container.parentElement.clientWidth || 500;
        let height = container.clientHeight || container.parentElement.clientHeight || 450;

        const scene = new THREE.Scene();
        // Fog para dar profundidade infinita
        scene.fog = new THREE.FogExp2(0x000000, 0.12);

        const camera = new THREE.PerspectiveCamera(60, width / height, 0.1, 100);
        camera.position.z = 5;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(width, height);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const group = new THREE.Group();
        scene.add(group);

        // Criar Cubos/Nós simulando o "Ledger/Glass Nodes" da imagem
        const nodeCount = 15;
        const nodes = [];
        const cubeGeo = new THREE.BoxGeometry(0.5, 0.5, 0.5);
        const cubeMatSolid = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.05 });
        const cubeMatWire = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.15, wireframe: true });

        for(let i = 0; i < nodeCount; i++) {
          const mesh = new THREE.Mesh(cubeGeo, Math.random() > 0.5 ? cubeMatSolid : cubeMatWire);
          mesh.position.set(
            (Math.random() - 0.5) * 10,
            (Math.random() - 0.5) * 10,
            (Math.random() - 0.5) * 10
          );
          mesh.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, 0);
          
          nodes.push({
            mesh,
            velocity: new THREE.Vector3((Math.random() - 0.5)*0.01, (Math.random() - 0.5)*0.01, (Math.random() - 0.5)*0.01)
          });
          group.add(mesh);
        }

        // Criar Partículas (Datapoints)
        const particleCount = 120;
        const particlesData = [];
        const pGeo = new THREE.BufferGeometry();
        const pPositions = new Float32Array(particleCount * 3);

        for (let i = 0; i < particleCount; i++) {
          pPositions[i * 3] = (Math.random() - 0.5) * 12;
          pPositions[i * 3 + 1] = (Math.random() - 0.5) * 12;
          pPositions[i * 3 + 2] = (Math.random() - 0.5) * 12;

          particlesData.push({
            velocity: new THREE.Vector3((Math.random() - 0.5) * 0.015, (Math.random() - 0.5) * 0.015, (Math.random() - 0.5) * 0.015),
            numConnections: 0
          });
        }

        pGeo.setAttribute('position', new THREE.BufferAttribute(pPositions, 3));
        
        // Textura suave para as partículas
        const canvas = document.createElement('canvas');
        canvas.width = 16; canvas.height = 16;
        const context = canvas.getContext('2d');
        const gradient = context.createRadialGradient(8, 8, 0, 8, 8, 8);
        gradient.addColorStop(0, 'rgba(255,255,255,1)');
        gradient.addColorStop(1, 'rgba(255,255,255,0)');
        context.fillStyle = gradient;
        context.fillRect(0,0,16,16);
        const pTexture = new THREE.CanvasTexture(canvas);

        const pMat = new THREE.PointsMaterial({
          color: 0xffffff,
          size: 0.15,
          map: pTexture,
          blending: THREE.AdditiveBlending,
          transparent: true,
          depthWrite: false,
          opacity: 0.6
        });

        const particleSystem = new THREE.Points(pGeo, pMat);
        group.add(particleSystem);

        // Linhas de conexão (Rede Blockchain)
        const maxConnections = 250;
        const linePositions = new Float32Array(maxConnections * 6);
        const linesGeo = new THREE.BufferGeometry();
        linesGeo.setAttribute('position', new THREE.BufferAttribute(linePositions, 3));

        const linesMat = new THREE.LineBasicMaterial({
          color: 0xffffff,
          transparent: true,
          opacity: 0.15,
          blending: THREE.AdditiveBlending
        });
        
        const linesMesh = new THREE.LineSegments(linesGeo, linesMat);
        group.add(linesMesh);

        // Interação com Mouse
        let targetRotationX = 0, targetRotationY = 0;
        const handleMouseMove = (e) => {
          const rect = container.getBoundingClientRect();
          const x = ((e.clientX - rect.left) / width) * 2 - 1;
          const y = -((e.clientY - rect.top) / height) * 2 + 1;
          targetRotationY = x * 0.2;
          targetRotationX = y * 0.2;
        };
        container.addEventListener('mousemove', handleMouseMove);

        let animationId;
        const animate = () => {
          animationId = requestAnimationFrame(animate);

          // Rotação suave baseada no mouse + constante
          group.rotation.x += (targetRotationX - group.rotation.x) * 0.05;
          group.rotation.y += (targetRotationY - group.rotation.y) * 0.05;
          group.rotation.y += 0.001; 

          // Atualizar os Cubos
          nodes.forEach(n => {
            n.mesh.position.add(n.velocity);
            n.mesh.rotation.x += 0.005;
            n.mesh.rotation.y += 0.005;
            
            if(n.mesh.position.x > 6 || n.mesh.position.x < -6) n.velocity.x *= -1;
            if(n.mesh.position.y > 6 || n.mesh.position.y < -6) n.velocity.y *= -1;
            if(n.mesh.position.z > 6 || n.mesh.position.z < -6) n.velocity.z *= -1;
          });

          // Atualizar partículas e recalcular linhas
          for (let i = 0; i < particleCount; i++) particlesData[i].numConnections = 0;

          const positions = particleSystem.geometry.attributes.position.array;
          let lineIndex = 0;

          for (let i = 0; i < particleCount; i++) {
            const particleData = particlesData[i];

            positions[i * 3] += particleData.velocity.x;
            positions[i * 3 + 1] += particleData.velocity.y;
            positions[i * 3 + 2] += particleData.velocity.z;

            // Bounce
            if (positions[i * 3] < -6 || positions[i * 3] > 6) particleData.velocity.x *= -1;
            if (positions[i * 3 + 1] < -6 || positions[i * 3 + 1] > 6) particleData.velocity.y *= -1;
            if (positions[i * 3 + 2] < -6 || positions[i * 3 + 2] > 6) particleData.velocity.z *= -1;

            // Checar distâncias para desenhar as conexões
            for (let j = i + 1; j < particleCount; j++) {
              const particleDataB = particlesData[j];
              const dx = positions[i * 3] - positions[j * 3];
              const dy = positions[i * 3 + 1] - positions[j * 3 + 1];
              const dz = positions[i * 3 + 2] - positions[j * 3 + 2];
              const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);

              if (dist < 2.5) {
                particleData.numConnections++;
                particleDataB.numConnections++;

                if (lineIndex < maxConnections * 6) {
                  linePositions[lineIndex++] = positions[i * 3];
                  linePositions[lineIndex++] = positions[i * 3 + 1];
                  linePositions[lineIndex++] = positions[i * 3 + 2];

                  linePositions[lineIndex++] = positions[j * 3];
                  linePositions[lineIndex++] = positions[j * 3 + 1];
                  linePositions[lineIndex++] = positions[j * 3 + 2];
                }
              }
            }
          }

          particleSystem.geometry.attributes.position.needsUpdate = true;
          
          linesMesh.geometry.attributes.position.needsUpdate = true;
          linesMesh.geometry.setDrawRange(0, lineIndex / 3);

          renderer.render(scene, camera);
        };
        animate();

        const handleResize = () => {
          if (!container) return;
          camera.aspect = container.clientWidth / container.clientHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(container.clientWidth, container.clientHeight);
        };
        window.addEventListener('resize', handleResize);

        return () => {
          cancelAnimationFrame(animationId);
          window.removeEventListener('resize', handleResize);
          if (container) {
            container.removeEventListener('mousemove', handleMouseMove);
            container.innerHTML = '';
          }
        };
      }, []);

      return (
        <div className="min-h-screen bg-black text-zinc-300 font-sans relative antialiased selection:bg-white selection:text-black">
          
          <div className="fixed inset-0 grid-data pointer-events-none z-0"></div>

          {/* HEADER MINIMALISTA */}
          <nav className="relative z-30 w-full px-8 py-5 border-b border-zinc-900 bg-black/50 backdrop-blur-md">
            <div className="max-w-7xl mx-auto flex justify-between items-center">
              <div className="flex items-center gap-3">
                <div className="w-8 h-8 rounded bg-zinc-900 border border-zinc-800 flex items-center justify-center text-white font-black text-xs">
                  <i className="ph-bold ph-shield-check" />
                </div>
                <div>
                  <span className="text-white font-bold tracking-widest text-xs uppercase block">Greentech</span>
                  <span className="text-[9px] block font-mono text-zinc-500 tracking-wider">Firewall Ambiental</span>
                </div>
              </div>
              <div className="flex items-center gap-2 text-[9px] font-mono text-zinc-500 uppercase tracking-widest border border-zinc-900 bg-zinc-950 px-3 py-1.5 rounded">
                <span className="w-1.5 h-1.5 rounded-full bg-zinc-300 animate-pulse"></span>
                Auditoria SINIR Ativa
              </div>
            </div>
          </nav>

          <main className="relative z-10 max-w-7xl mx-auto px-6 pt-20 pb-24">
            
            {/* HERO SECTION - DATA DRIVEN */}
            <section className="grid lg:grid-cols-2 gap-16 items-center mb-32">
              <div className="space-y-8">
                <div className="inline-flex items-center gap-2 px-3 py-1.5 border border-zinc-800 bg-zinc-950 text-[10px] font-mono text-zinc-300">
                  <i className="ph-bold ph-radar text-white" />
                  <span>INTELIGÊNCIA FISCAL APLICADA</span>
                </div>
                
                <h1 className="text-4xl md:text-5xl font-bold text-white leading-tight tracking-tight">
                  Algoritmos cruzam MTRs e NFs em milissegundos. <br/>
                  <span className="text-zinc-500">Seu lastro suporta o teste?</span>
                </h1>
                
                <p className="text-sm text-zinc-400 leading-relaxed font-light">
                  A SEFAZ e o IBAMA automatizaram o embargo. Indústrias que dependem de planilhas e cooperativas não-auditadas estão expostas à suspensão da CND e bloqueio de capital em 48 horas.
                </p>

                {/* ESTATÍSTICAS SÉRIAS */}
                <div className="grid grid-cols-2 sm:grid-cols-3 gap-8 py-4 border-t border-b border-zinc-900">
                  <div>
                    <span className="text-3xl font-bold text-white block">+400%</span>
                    <span className="text-[10px] font-mono text-zinc-500 uppercase block mt-2">Aumento de Autuações</span>
                  </div>
                  <div className="border-l border-zinc-900 pl-8">
                    <span className="text-3xl font-bold text-white block">R$ 50M</span>
                    <span className="text-[10px] font-mono text-zinc-500 uppercase block mt-2">Multas Aplicadas em SP</span>
                  </div>
                  <div className="border-l border-zinc-900 pl-8 hidden sm:block">
                    <span className="text-3xl font-bold text-white block">22%</span>
                    <span className="text-[10px] font-mono text-zinc-500 uppercase block mt-2">Déficit de PNRS Médio</span>
                  </div>
                </div>
              </div>

              {/* INTERACTIVE 3D CONCEPT */}
              <div className="relative flex flex-col items-center justify-center min-h-[450px] border border-zinc-900 bg-zinc-950 p-2 overflow-hidden shadow-2xl cursor-crosshair">
                <div className="absolute inset-0 z-10 pointer-events-auto mix-blend-screen" ref={canvasRef}></div>
                <div className="absolute bottom-5 z-20 px-4 py-2 bg-black/80 border border-zinc-800 text-[9px] font-mono text-zinc-400 backdrop-blur-md">
                  Rede de Dados em Tempo Real (Live)
                </div>
              </div>
            </section>
          </main>

          {/* --- INÍCIO SPIN SELLING --- */}
          <div className="w-full bg-black relative z-10">
            
            {/* S: Situação */}
            <section className="relative py-32 px-6 sm:px-12 border-t border-zinc-900 overflow-hidden">
              <div className="max-w-5xl mx-auto relative z-10 grid md:grid-cols-2 gap-16 items-center">
                <div className="space-y-6 animate-in slide-in-from-bottom-10 fade-in duration-1000">
                  <div className="inline-flex items-center gap-2 px-3 py-1 bg-zinc-900 text-zinc-400 text-[10px] font-mono uppercase font-bold tracking-widest rounded-full border border-zinc-800">
                    <i className="ph-bold ph-globe-hemisphere-west"></i> O Novo Cenário
                  </div>
                  <h2 className="text-4xl md:text-5xl font-bold text-white tracking-tight leading-tight">
                    Sustentabilidade Virou Risco Tributário.
                  </h2>
                  <p className="text-lg text-zinc-400 font-light leading-relaxed">
                    A Receita Federal cruzou os dados fiscais com o sistema federal do SINIR. A conformidade ambiental da logística reversa deixou de ser uma política de marca para se tornar uma obrigação cruzada via SPED.
                  </p>
                </div>
                <div className="relative p-12 bg-zinc-900/30 border border-zinc-800 rounded-2xl glow-card overflow-hidden group">
                  <img src="./assets/dashboard.png" alt="" className="absolute inset-0 w-full h-full object-cover opacity-10 mix-blend-overlay pointer-events-none group-hover:scale-105 transition-transform duration-1000" />
                  <div className="relative z-10">
                    <div className="text-zinc-500 font-mono text-xs uppercase tracking-widest mb-4">Projeção de Autuações (2026)</div>
                    <div className="text-5xl font-bold text-white tracking-tighter">R$ 4.2 Bi</div>
                    <div className="text-sm text-red-400 mt-4 flex items-center gap-2">
                      <i className="ph-bold ph-trend-up"></i> +400% de aumento nas multas via SEFAZ
                    </div>
                  </div>
                </div>
              </div>
            </section>

            {/* P: Problema - Isometric Data Layers (Creative + Corporate) */}
            <section className="relative py-32 px-6 sm:px-12 border-t border-zinc-900 bg-[#020202] overflow-hidden perspective-1000">
              <div className="max-w-7xl mx-auto">
                <div className="grid lg:grid-cols-2 gap-16 md:gap-24 items-center">
                  
                  {/* Left: Content & Text */}
                  <div className="space-y-12 z-10 relative">
                    <div>
                      <div className="inline-flex items-center gap-2 px-3 py-1 bg-red-950/20 text-red-500 text-[10px] font-mono uppercase tracking-widest rounded-full border border-red-900/30 mb-8">
                         <span className="w-1.5 h-1.5 rounded-full bg-red-500"></span> Fraude Estrutural
                      </div>
                      <h2 className="text-4xl md:text-5xl font-light text-white tracking-tight leading-tight mb-6">
                        A Cadeia de Suprimentos <br className="hidden md:block" />está <span className="font-semibold text-red-500">Corrompida</span>.
                      </h2>
                      <p className="text-lg text-zinc-400 font-light leading-relaxed max-w-lg">
                        Intermediários opacos criam furos sistêmicos no balanço de massa. O modelo atual transfere o risco criminal de terceiros diretamente para o seu CNPJ.
                      </p>
                    </div>

                    <div className="space-y-2 relative border-l border-zinc-800/50 pl-6">
                      
                      {/* Item 1 */}
                      <div className="group py-6 border-b border-zinc-800/50 hover:border-zinc-500 transition-colors cursor-default">
                        <span className="text-zinc-600 font-mono text-[10px] tracking-widest uppercase block mb-3">Camada 01</span>
                        <h3 className="text-xl font-medium text-zinc-200 group-hover:text-white mb-2 transition-colors">Inconsistência de Massa</h3>
                        <p className="text-sm text-zinc-500 group-hover:text-zinc-300 font-light leading-relaxed transition-colors max-w-md">
                          A divergência bruta entre o volume real de embalagens e a compensação declarada é o gatilho instantâneo da malha fina fiscal.
                        </p>
                      </div>

                      {/* Item 2 */}
                      <div className="group py-6 border-b border-zinc-800/50 hover:border-zinc-500 transition-colors cursor-default">
                        <span className="text-zinc-600 font-mono text-[10px] tracking-widest uppercase block mb-3">Camada 02</span>
                        <h3 className="text-xl font-medium text-zinc-200 group-hover:text-white mb-2 transition-colors">Operações de Fachada</h3>
                        <p className="text-sm text-zinc-500 group-hover:text-zinc-300 font-light leading-relaxed transition-colors max-w-md">
                          Certificados de cooperativas inoperantes sem lastro físico. A fraude de terceiros contamina sua declaração corporativa, gerando co-responsabilidade.
                        </p>
                      </div>

                      {/* Item 3 (Crítico) */}
                      <div className="group py-6 border-b border-red-900/50 hover:border-red-500 transition-colors cursor-default relative">
                        <div className="absolute -left-6 top-0 bottom-0 w-[1px] bg-red-500/0 group-hover:bg-red-500 transition-colors"></div>
                        <span className="text-red-500/50 font-mono text-[10px] tracking-widest uppercase block mb-3 font-bold group-hover:text-red-500">Camada 03 Crítica</span>
                        <h3 className="text-xl font-medium text-red-500 group-hover:text-red-400 mb-2 transition-colors">Duplicidade de MTR</h3>
                        <p className="text-red-900/60 group-hover:text-red-200/80 font-light leading-relaxed transition-colors max-w-md">
                          A mesma tonelada transacionada ilicitamente para múltiplos CNPJs. Os sistemas federais detectam o conflito criptográfico de imediato.
                        </p>
                      </div>

                    </div>
                  </div>

                  {/* Right: Isometric Visualization (The Creative Hook) */}
                  <div className="relative h-[600px] hidden lg:flex items-center justify-center">
                    
                    {/* Isometric Canvas */}
                    <div 
                      className="relative w-[300px] h-[300px] hover:scale-105 transition-transform duration-1000 ease-out" 
                      style={{ transform: 'rotateX(55deg) rotateZ(-45deg)', transformStyle: 'preserve-3d' }}
                    >
                      {/* Vertical Red Beam connecting the flaws */}
                      <div className="absolute top-1/2 left-1/2 w-1 h-[300px] bg-red-500/40 blur-[2px] shadow-[0_0_20px_rgba(239,68,68,0.8)]" style={{ transform: 'translate(-50%, -50%) rotateX(-90deg)', transformOrigin: 'top' }}></div>

                      {/* Layer 1: Inconsistência de Massa (Bottom) */}
                      <div className="absolute inset-0 bg-[#0a0a0a]/80 border border-zinc-700/50 backdrop-blur-md rounded-2xl shadow-[20px_20px_40px_rgba(0,0,0,0.9)] transition-all duration-700 hover:border-zinc-400 hover:-translate-y-2 group" style={{ transform: 'translateZ(0px)' }}>
                        <div className="absolute inset-0 bg-[linear-gradient(45deg,transparent_20%,rgba(255,255,255,0.03)_50%,transparent_80%)]"></div>
                        <div className="absolute top-4 left-4 text-zinc-500 font-mono text-[10px] uppercase font-bold tracking-widest">L1: Massa Física</div>
                        <div className="absolute bottom-6 left-6 right-6 flex gap-2 opacity-40 group-hover:opacity-100 transition-opacity">
                           <div className="h-1.5 flex-1 bg-zinc-600 rounded-full"></div>
                           <div className="h-1.5 flex-1 bg-zinc-600 rounded-full"></div>
                           <div className="h-1.5 flex-1 bg-red-600 rounded-full animate-pulse"></div> {/* Divergence */}
                        </div>
                      </div>

                      {/* Layer 2: Operações de Fachada (Middle) */}
                      <div className="absolute inset-0 bg-[#0a0a0a]/80 border border-zinc-700/50 backdrop-blur-md rounded-2xl shadow-[20px_20px_40px_rgba(0,0,0,0.9)] transition-all duration-700 hover:border-zinc-400 hover:-translate-y-2" style={{ transform: 'translateZ(100px)' }}>
                         <div className="absolute inset-0 bg-[linear-gradient(45deg,transparent_20%,rgba(255,255,255,0.03)_50%,transparent_80%)]"></div>
                         <div className="absolute top-4 left-4 text-zinc-500 font-mono text-[10px] uppercase font-bold tracking-widest">L2: Validação Documental</div>
                         {/* Fake operation visual */}
                         <div className="absolute inset-0 m-auto w-16 h-16 border-2 border-dashed border-red-500/40 rounded flex items-center justify-center bg-red-500/5">
                            <span className="text-red-500 font-mono text-xs">NULL</span>
                         </div>
